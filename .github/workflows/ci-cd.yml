name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  NODE_VERSION: '22'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: squash_bot_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type checking
        run: npm run typecheck

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/squash_bot_test
          ENVIRONMENT: test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    concurrency:
      group: e2e-tests
      cancel-in-progress: true

    # Playwright container has Chromium pre-installed — no browser download needed
    # Version must match @playwright/test in package.json
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: squash_bot_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Telegram auth state
        run: |
          mkdir -p .auth
          echo '${{ secrets.TELEGRAM_AUTH_STATE }}' > .auth/telegram-auth.json

      - name: Use CI environment
        run: cp .env.ci .env.test

      - name: Run migrations and seed
        run: npx tsx src/storage/db/migrate.ts && npx tsx src/storage/db/seed.ts
        env:
          DATABASE_URL: postgresql://postgres:test@postgres:5432/squash_bot_test
          ENVIRONMENT: test

      - name: Start bot
        run: npx tsx src/index.ts &
        env:
          DATABASE_URL: postgresql://postgres:test@postgres:5432/squash_bot_test
          ENVIRONMENT: test

      - name: Wait for bot to be healthy
        run: |
          echo "Waiting for bot to become healthy..."
          for i in $(seq 1 30); do
            if node -e "require('http').get('http://localhost:3010/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));" 2>/dev/null; then
              echo "Bot is healthy!"
              exit 0
            fi
            echo "  Attempt $i/30"
            sleep 2
          done
          echo "Bot failed to become healthy"
          exit 1
        timeout-minutes: 2

      - name: Run E2E tests
        run: npx playwright test tests/e2e --config=playwright.config.mjs
        env:
          ENVIRONMENT: test
          CI: true

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
      url: https://puelle.me

    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            cd /opt/squash-bot
            docker compose pull
            docker compose up -d
          ENDSSH

      - name: Verify deployment
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            echo "Waiting for bot to become healthy..."
            for i in $(seq 1 30); do
              status=$(docker inspect --format='{{.State.Health.Status}}' squash-bot-app 2>/dev/null || echo "not_found")
              if [ "$status" = "healthy" ]; then
                echo "Bot is healthy!"
                docker compose -f /opt/squash-bot/docker-compose.yml logs bot --tail 5
                exit 0
              fi
              echo "  Attempt $i/30: status=$status"
              sleep 5
            done
            echo "ERROR: Bot failed to become healthy!"
            docker compose -f /opt/squash-bot/docker-compose.yml logs bot --tail 30
            exit 1
          ENDSSH
